# azure-pipelines.yml ────────────────────────────────────────────
trigger:
  branches:
    include:
      - develop          # ← normal CI/CD

pr:
  branches:
    include:
      - develop          # ← PR validation

# ─────────────── Common variables ───────────────
variables:
  dockerRegistryServiceConnection: "cded2d3b-6a50-4f45-a781-7e60a4e51b58"
  imageRepository:    "perygon-develop"
  containerRegistry:  "sedulocontainerreg.azurecr.io"
  dockerfilePath:     "$(Build.SourcesDirectory)/Dockerfile"
  tag:                "latest"
  vmImageName:        "ubuntu-latest"
  AGKey:              "$(NEXT_PUBLIC_AG_GRID_LICENSE_KEY)"

# ================================================================
#  STAGE 1 -- fast PR validation
# ================================================================
stages:
- stage: UnitTest
  displayName: "Build / Test"
  jobs:
  - job: Test
    displayName: "Restore → Compile → Test"
    pool:
      vmImage: $(vmImageName)
    steps:
    # ----- restore / install -----
    - script: echo "##[section]️ Installing dependencies"
      displayName: "Install deps"
      # e.g. npm ci   / dotnet restore   / pnpm i   etc.

    # ----- compile -----
    - script: echo "##[section]️ Building the app"
      displayName: "Compile"
      # e.g. npm run build   / dotnet build

    # ----- unit tests -----
    - script: echo "##[section]️ Running tests"
      displayName: "Unit tests"
      # e.g. npm test -- --ci   / dotnet test

# ================================================================
#  STAGE 2 -- full container build + deploy  (CI only)
# ================================================================
- stage: Containerize
  displayName: "Build Docker → Push → Deploy"
  dependsOn: UnitTest
  condition: and(succeeded(),
                 eq(variables['Build.SourceBranch'], 'refs/heads/develop'),
                 ne(variables['Build.Reason'], 'PullRequest'))

  jobs:
  # ────────── Build + push image ──────────
  - job: BuildPush
    displayName: "Docker build & push"
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: "Build & push image"
      inputs:
        command: buildAndPush
        dockerfile: $(dockerfilePath)
        repository: $(imageRepository)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

  # ────────── Deploy (optional) ──────────
  - job: Deploy
    displayName: "Deploy container"
    dependsOn: BuildPush
    pool:
      vmImage: $(vmImageName)
    steps:
    - script: echo "kubectl apply -f k8s/*.yaml"
      displayName: "kubectl apply"

