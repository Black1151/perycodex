trigger:
  branches:
   include:
     - develop
pr:
  branches:
   include:
     - develop

variables:
  dockerRegistryServiceConnection: "cded2d3b-6a50-4f45-a781-7e60a4e51b58"
  imageRepository:    "perygon-develop"
  containerRegistry:  "sedulocontainerreg.azurecr.io"
  dockerfilePath:     "$(Build.SourcesDirectory)/Dockerfile"
  tag:                "latest"
  vmImageName:        "ubuntu-latest"
  AGKey:              "$(NEXT_PUBLIC_AG_GRID_LICENSE_KEY)"

stages:
# ───────── Stage 1 – PR validation ─────────
- stage: UnitTest
  displayName: "Docker build (validation only)"
  jobs:
  - job: BuildOnly
    pool: { vmImage: $(vmImageName) }
    steps:
    - task: Docker@2
      displayName: "docker build – no push"
      inputs:
        command: build
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        tags: |
          $(tag)-pr-$(Build.BuildId)
        # pass any build-args your Dockerfile expects
        arguments: |
          --build-arg NEXT_PUBLIC_AG_GRID_LICENSE_KEY=$(AGKey)

# ───────── Stage 2 – build + push + deploy (CI only) ─────────
- stage: Containerize
  displayName: "Build → Push → Deploy"
  dependsOn: UnitTest
  condition: and(
              succeeded(),
              eq( variables['Build.SourceBranch'], 'refs/heads/develop'),
              ne( variables['Build.Reason'], 'PullRequest')
            )

  jobs:
  - job: BuildPush
    displayName: "docker build + push"
    pool: { vmImage: $(vmImageName) }
    steps:
    - task: Docker@2
      displayName: "docker build & push"
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
        arguments: |
          --build-arg NEXT_PUBLIC_AG_GRID_LICENSE_KEY=$(AGKey)

  - job: Deploy
    displayName: "kubectl apply"
    dependsOn: BuildPush
    pool: { vmImage: $(vmImageName) }
    steps:
    - script: kubectl apply -f k8s/
      displayName: "Deploy manifest"
