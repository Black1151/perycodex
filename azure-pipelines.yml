trigger:
- master

resources:
- repo: self

variables:
  dockerRegistryServiceConnection: '66fad5e1-b8c4-40c7-8b5d-333a33906a9b'
  imageRepository: 'happiness-score'
  containerRegistry: 'sedulocontainerreg.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'
  # NODE_ENV: 'production'  # Application-specific environment variable

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: UseNode@2
      inputs:
        version: '20.x'
      displayName: 'Use Node.js 20.x'

    - task: AzureKeyVault@1
      inputs:
        azureSubscription: 'YOUR_SERVICE_CONNECTION_NAME'
        KeyVaultName: 'YOUR_KEY_VAULT_NAME'
        SecretsFilter: '*'
        RunAsPreJob: true

    - script: npm ci
      displayName: 'Install dependencies'
      continueOnError: false

    - script: npm run lint
      displayName: 'Run linting'
      continueOnError: false

    - script: npm run type-check
      displayName: 'Run TypeScript type checking'
      continueOnError: false

    - script: npm test
      displayName: 'Run tests'
      continueOnError: false

    - script: npm run build
      displayName: 'Build project'
      continueOnError: false

    - task: Docker@2
      displayName: 'Build and push an image to container registry'
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

- stage: Deploy
  displayName: Deploy stage
  jobs:
  - deployment: DeployWebApp
    displayName: Deploy to Azure App Service
    environment: 'production'
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.x'
              addToPath: true

          - task: AzureWebAppContainer@1
            displayName: 'Deploy to Azure Web App'
            inputs:
              azureSubscription: $(dockerRegistryServiceConnection)
              appName: 'YourAppName'
              imageName: '$(containerRegistry)/$(imageRepository):$(tag)'

